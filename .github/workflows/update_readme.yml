name: Refresh README Stats

on:
  schedule:
    - cron: "0 */6 * * *"  # tiap 6 jam
  workflow_dispatch:       # bisa dijalankan manual juga

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update README (cache bust)
        run: |
          date > .timestamp

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .timestamp
          git commit -m "auto: refresh stats" || echo "No changes to commit"
          git push